<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Joseki Trainer</title>
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">Go Joseki Trainer</div>
      <div class="topbar-controls">
        <input type="text" id="josekiSearch" placeholder="Rechercher une séquence..." />
        <select id="josekiSelect"></select>
      </div>
    </header>

    <section class="study-card">
      <div class="study-header">
        <div class="eyebrow">Séquence de travail</div>
        <h1 id="currentTitle">Chargement...</h1>
        <p id="goal" class="goal-text">Chargement de l'objectif...</p>
        <p id="priority" class="secondary-text"></p>
        <p id="instruction" class="secondary-text"></p>

        <div class="variation-box" id="variationBox">
          <span class="variation-label">Variation active</span>
          <strong id="variationTitle">Aucune</strong>
        </div>
      </div>

      <div class="board-shell">
        <canvas id="board" width="760" height="760" aria-label="Goban interactif"></canvas>
      </div>

      <div class="status" id="status">Chargement des joseki...</div>

      <section class="progress-card">
        <div class="progress-header">
          <div>
            <div class="eyebrow">Séquence jouée</div>
            <div class="progress-count"><span id="playedCount">0</span>/<span id="totalCount">0</span> coups joués</div>
          </div>
        </div>
        <ol class="move-list" id="playedMoves"></ol>
      </section>

      <div class="controls">
        <button id="hintBtn" class="secondary">Indice</button>
        <button id="resetBtn" class="secondary">Recommencer</button>
        <button id="answerBtn" class="danger">Voir la réponse</button>
      </div>

      <div class="hint" id="hintBox"></div>
      <div class="answer" id="answerBox"></div>
    </section>
  </main>

  <script src="app.js?v=7"></script>
</body>
</html>
